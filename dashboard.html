<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/hamburger.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/dark-mode.css" />
    <link rel="stylesheet" href="css/utilities.css" />
    <title>Fake-Login</title>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <span>Sals.Id</span>
        <button class="hamburger" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <div class="overlay"></div>

    <aside class="sidebar">
      <h2 class="sidebar-title">menu</h2>
      <nav>
        <ul class="menu">
          <li class="wrapper-item">
            <div
              id="darkBtn"
              class="menu-dark-mode menu-item container-space-between"
            >
              <span class="menu-label">Dark Mode</span>
              <button type="button" class="toggle-box">
                <span class="toggle-circle"></span>
              </button>
            </div>
          </li>

          <li class="wrapper-item">
            <div id="menuViewAccount" class="menu-item">
              <span class="menu-label">View account</span>
            </div>
          </li>

          <li class="wrapper-item">
            <div class="menu-item"></div>
          </li>

          <li class="wrapper-item">
            <div class="menu-item"></div>
          </li>
        </ul>
      </nav>
    </aside>

    <main class="container">
      <section id="dashboard-section" class="dashboard">
        <div class="container-space-between margin-top-32">
          <button id="logoutBtn" class="btn btn-primary">Logout</button>
          <div class="time-zone">
            <p id="liveDate" class="live-date"></p>
            <p id="liveTime" class="live-time"></p>
          </div>
        </div>
        <div>
          <h1 class="title-dashboard">Selamat Datang</h1>
          <p class="user-email" id="userEmail"></p>
        </div>
      </section>
      <section id="view-account-section" class="view-account" hidden>
        <div class="margin-top-16">
          <button id="btnBack" class="btn-back">Back</button>
        </div>
        <h2 class="margin-top-48">View account</h2>
        <ul id="listAccount" class="list-account"></ul>
      </section>
    </main>

    <script type="module" src="js/dashboard.js"></script>
  </body>
</html>
